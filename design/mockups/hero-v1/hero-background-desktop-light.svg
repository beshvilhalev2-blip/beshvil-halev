    <path stroke="#57534E" stroke-opacity="0.09" stroke-width="1" d="M 40 710 C 220 692, 380 676, 580 662 C 820 646, 1020 632, 1360 620"/>
    <path stroke="#57534E" stroke-opacity="0.085" stroke-width="1" d="M 70 735 C 250 718, 410 704, 610 690 C 850 674, 1050 660, 1330 648"/>
