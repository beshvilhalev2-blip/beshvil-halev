<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" fill="none" role="img" aria-label="Mockup  -  Beshvil Halev hero background, desktop light">
  <defs>
    <linearGradient id="sky" x1="720" y1="0" x2="720" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFBF7"/>
      <stop offset="55%" stop-color="#F3EBE2"/>
      <stop offset="100%" stop-color="#E8DFD4"/>
    </linearGradient>
    <radialGradient id="earthMid" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#A8A29E" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#A8A29E" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="oliveShade" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#6B705C" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6B705C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="oliveDeep" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#556B2F" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#556B2F" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="warmSoil" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#92400E" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#92400E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="vignetteBottom" x1="720" y1="420" x2="720" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#292524" stop-opacity="0"/>
      <stop offset="55%" stop-color="#292524" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#292524" stop-opacity="0.26"/>
    </linearGradient>
    <linearGradient id="vignetteTop" x1="720" y1="0" x2="720" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#292524" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#292524" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sideFade" x1="0" y1="0" x2="1440" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFBF7" stop-opacity="0.35"/>
      <stop offset="12%" stop-color="#FFFBF7" stop-opacity="0"/>
      <stop offset="88%" stop-color="#FFFBF7" stop-opacity="0"/>
      <stop offset="100%" stop-color="#FFFBF7" stop-opacity="0.35"/>
    </linearGradient>
    <filter id="washBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="48"/>
    </filter>
    <filter id="pathBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="28"/>
    </filter>
  </defs>

  <rect width="1440" height="900" fill="url(#sky)"/>

  <!-- Nature washes ~70% -->
  <g filter="url(#washBlur)">
    <ellipse cx="980" cy="620" rx="520" ry="210" fill="url(#earthMid)"/>
    <ellipse cx="320" cy="680" rx="460" ry="190" fill="url(#oliveShade)"/>
    <ellipse cx="180" cy="820" rx="340" ry="140" fill="url(#oliveDeep)"/>
    <ellipse cx="1180" cy="760" rx="380" ry="160" fill="url(#warmSoil)"/>
  </g>

  <!-- Path channel ~10%  -  squint-invisible -->
  <path
    filter="url(#pathBlur)"
    fill="#FAF7F2"
    fill-opacity="0.14"
    d="M 1220 780 C 1080 760, 920 710, 760 690 C 620 672, 500 660, 360 640 C 260 628, 180 610, 120 590 C 90 580, 70 565, 60 550"
  />

  <!-- Contours ~20% -->
