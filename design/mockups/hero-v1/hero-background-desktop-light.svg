    <path stroke="#57534E" stroke-opacity="0.075" stroke-width="1" d="M 160 778 C 340 762, 500 748, 700 734 C 940 718, 1140 704, 1240 694"/>
    <path stroke="#57534E" stroke-opacity="0.07" stroke-width="1" d="M 220 794 C 400 780, 560 766, 760 752 C 1000 736, 1180 724, 1200 722"/>

    <path stroke="#57534E" stroke-opacity="0.05" stroke-width="1" d="M 120 520 C 300 510, 480 500, 680 492 C 920 482, 1120 474, 1280 468"/>
    <path stroke="#57534E" stroke-opacity="0.055" stroke-width="1" d="M 100 500 C 280 492, 460 484, 660 476 C 900 466, 1100 458, 1260 452"/>
    <path stroke="#57534E" stroke-opacity="0.05" stroke-width="1" d="M 140 480 C 320 474, 500 468, 700 462 C 940 454, 1140 446, 1220 442"/>

    <path stroke="#57534E" stroke-opacity="0.045" stroke-width="1" d="M 200 450 C 380 446, 560 442, 760 438 C 1000 432, 1180 428, 1200 427"/>
    <path stroke="#57534E" stroke-opacity="0.04" stroke-width="1" d="M 260 430 C 440 428, 620 426, 820 424 C 1060 420, 1140 418, 1160 417"/>
    <path stroke="#57534E" stroke-opacity="0.035" stroke-width="1" d="M 320 415 C 500 414, 680 413, 880 412 C 1080 410, 1120 409, 1140 408"/>

    <path stroke="#B45309" stroke-opacity="0.09" stroke-width="1" d="M 980 640 C 860 628, 740 618, 620 610 C 520 604, 420 598, 320 592"/>

    <path stroke="#57534E" stroke-opacity="0.06" stroke-width="1" d="M 380 640 C 420 620, 460 600, 500 580 C 540 560, 580 545, 620 535"/>
    <path stroke="#57534E" stroke-opacity="0.065" stroke-width="1" d="M 420 660 C 460 642, 500 624, 540 608 C 580 592, 620 580, 660 570"/>
    <path stroke="#57534E" stroke-opacity="0.07" stroke-width="1" d="M 460 680 C 500 664, 540 648, 580 634 C 620 620, 660 610, 700 602"/>
    <path stroke="#57534E" stroke-opacity="0.06" stroke-width="1" d="M 760 700 C 800 684, 840 668, 880 654 C 920 640, 960 628, 1000 618"/>
    <path stroke="#57534E" stroke-opacity="0.055" stroke-width="1" d="M 820 720 C 860 706, 900 692, 940 680 C 980 668, 1020 658, 1060 650"/>
  </g>

  <!-- Readability overlays (mockup) -->
  <rect width="1440" height="900" fill="url(#vignetteTop)"/>
  <rect width="1440" height="900" fill="url(#vignetteBottom)"/>
  <rect width="1440" height="900" fill="url(#sideFade)"/>
</svg>
