    <path stroke="#57534E" stroke-opacity="0.06" stroke-width="1" d="M 80 560 C 260 540, 420 530, 620 520 C 860 508, 1080 500, 1320 490"/>
    <path stroke="#57534E" stroke-opacity="0.07" stroke-width="1" d="M 60 590 C 240 572, 400 560, 600 548 C 840 534, 1060 524, 1340 512"/>
